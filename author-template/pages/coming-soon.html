<!DOCTYPE html>
<html dir="ltr" lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Aria Vance</title>
  <link rel="icon" type="image/png" href="../assets/images/content/favicon.webp">

  <!-- AOS Animation CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- RTL Support Settings -->
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">


  <!-- Cinematic Main Content -->
  <main style="flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, rgba(149, 79, 240, 0.15) 0%, transparent 60%), linear-gradient(to bottom, rgba(11, 29, 58, 0.9), rgba(11, 29, 58, 0.95)), url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=1920&q=80') center/cover; position: relative; overflow: hidden; padding: 4rem 1rem;">

    <div style="position: relative; z-index: 10; width: 100%; max-width: 800px; text-align: center;" data-aos="fade-up" data-aos-duration="1200">

        <!-- Status Badge -->
        <div style="display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(149, 79, 240, 0.1); border: 1px solid rgba(149, 79, 240, 0.3); padding: 0.4rem 1.2rem; border-radius: 50px; margin-bottom: 2rem;">
            <div style="width: 8px; height: 8px; background: var(--color-accent); border-radius: 50%; box-shadow: 0 0 10px var(--color-accent); animation: pulse 2s infinite;"></div>
            <span style="font-family: var(--font-heading); font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; color: #fff; text-transform: uppercase;">System Upgrade in Progress</span>
        </div>

        <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 850; letter-spacing: -1px; line-height: 1.1; margin-bottom: 1.5rem; color: #fff;">
            A New Universe <br><span class="text-gradient">is Forming</span>
        </h1>

        <p style="font-size: clamp(1rem, 2vw, 1.25rem); color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto 3rem; line-height: 1.6;">
            The official portal of Aria Vance is currently undergoing a massive stellar reconstruction. Join the waitlist to be notified the moment the orbital gateways open.
        </p>

        <!-- Responsive Waitlist Form -->
        <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 2rem; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.4);" data-aos="fade-up" data-aos-delay="200">
          <form action="#" style="display: flex; flex-direction: column; gap: 1rem; width: 100%;" onsubmit="event.preventDefault(); alert('Waitlist recorded!  We will notify you.');">
            <div style="display: flex; flex-wrap: wrap; gap: 1rem; width: 100%;">
                <div style="flex: 1; min-width: 250px; position: relative;">
                    <i class="fa-solid fa-satellite-dish" style="position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4);"></i>
                    <input type="email" placeholder="Enter your email address" required
                      style="width: 100%; padding: 1.1rem 1rem 1.1rem 3rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 0.95rem; outline: none; transition: all 0.3s ease; box-sizing: border-box;"
                      onfocus="this.style.borderColor='var(--color-primary)'; this.style.background='rgba(0,0,0,0.4)';"
                      onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.background='rgba(0,0,0,0.2)';">
                </div>
                <button type="submit" class="bg-gradient-primary"
                  style="padding: 1.1rem 2rem; border-radius: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; border: none; color: white; white-space: nowrap; min-width: 150px;">
                    NOTIFY ME <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
                </button>
            </div>
            <p style="font-size: 0.75rem; color: rgba(255,255,255,0.4); margin: 0; text-align: left;">
              <i class="fa-solid fa-shield-halved" style="margin-right: 5px;"></i> Zero spam. Secure transmission only.
            </p>
          </form>
        </div>
    </div>
  </main>


  <script src="../assets/js/main.js"></script>
  <!-- AOS Animation Script -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      if (typeof AOS !== 'undefined') {
        AOS.init({ duration: 800, once: true, offset: 100 });
      }

    });
  </script>
  <!-- RTL Support Script -->
  <script src="../assets/js/rtl-ltr.js"></script>
</body>
</html>
