<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Aria Vance...</title>
    <!-- Meta refresh for automatic redirection -->
    <meta http-equiv="refresh" content="0; url=pages/index.html">
    <script>
        // JavaScript redirection as a fallback
        window.location.href = "pages/index.html";
    </script>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .redirect-box {
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
        }
        a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="redirect-box">
        <div class="loader"></div>
        <p>Redirecting you to the Aethelgard System...</p>
        <p style="font-size: 0.9rem; opacity: 0.7;">If you are not redirected automatically, <a href="pages/index.html">click here</a>.</p>
    </div>
</body>
</html>
